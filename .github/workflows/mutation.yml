on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'psalm.xml'

  push:
    branches: ['master']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'psalm.xml'

name: mutation test

permissions:
  contents: read
jobs:
  detect-source:
    runs-on: ubuntu-latest
    outputs:
      has-source: ${{ steps.source.outputs.has-source }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - id: source
        run: |
          if [ -n "$(find src -type f -name '*.php' -print -quit 2>/dev/null)" ]; then
            echo "has-source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-source=false" >> "$GITHUB_OUTPUT"
          fi

  mutation:
    needs: detect-source
    if: ${{ needs.detect-source.outputs.has-source == 'true' }}
    uses: yiisoft/actions/.github/workflows/roave-infection.yml@master
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.2']
    secrets:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
