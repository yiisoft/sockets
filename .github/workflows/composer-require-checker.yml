on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'phpunit.xml.dist'
      - 'psalm.xml'

  push:
    branches: ['master']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'phpunit.xml.dist'
      - 'psalm.xml'

name: Composer require checker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  detect-source:
    name: Detect PHP source
    runs-on: ubuntu-latest
    outputs:
      has-source: ${{ steps.source.outputs.has-source }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: source
        run: |
          if [ -n "$(find src -type f -name '*.php' -print -quit 2>/dev/null)" ]; then
            echo "has-source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-source=false" >> "$GITHUB_OUTPUT"
          fi

  composer-require-checker:
    needs: detect-source
    if: ${{ needs.detect-source.outputs.has-source == 'true' }}
    uses: yiisoft/actions/.github/workflows/composer-require-checker.yml@master
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.1', '8.2']
